name: Delete old folders from github pages

on:
  # schedule:
  #   - cron: '0 12 * * 5' # At 12:00 UTC, only on Friday
  workflow_dispatch:
    inputs:
      n_days:
        description: 'Number of days to determine which folders to delete. Example: 10 will delete all folders older than 10 days'
        required: true
        default: 10
      folder_name:
        description: 'Name of the folder where you store the reports. Default is root'
        required: true
        default: '.'

jobs:
  delete_old_folders:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.9

      - name: Pray then Run the script
        run: python rm_old_folders.py --n-days ${{ github.event.inputs.n_days }} --folder-name ${{ github.event.inputs.folder_name }}

      - name: Generate manifests (dev-results, stg-results)
        run: |
          set -e

          generate_manifest () {
            env_dir="$1"
            mkdir -p "$env_dir"

            runs=$(ls -1 "$env_dir" 2>/dev/null | grep -E '^[0-9]{8}_[0-9]{6}Z$' | sort -r || true)

            echo '{ "runs": [' > "$env_dir/manifest.json"
            first=1
            for folder in $runs
            do
              if [ $first -eq 0 ]; then echo ',' >> "$env_dir/manifest.json"; fi
              first=0
              echo "  { \"folder\": \"${folder}\", \"url\": \"${env_dir}/${folder}/index.html\" }" >> "$env_dir/manifest.json"
            done
            echo '] }' >> "$env_dir/manifest.json"
          }

          generate_manifest "dev-results"
          generate_manifest "stg-results"

      - name: Commit all changed files back to the repository
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: gh-pages
          commit_message: Delete folders older than ${{ github.event.inputs.n_days }} days
