name: Delete Old Reports

on:
  # schedule:
  #   - cron: '0 12 * * 5' # At 12:00 UTC, only on Friday
  workflow_run:
    workflows: ['Playwright Tests']
    types:
      - completed
    branches: main
  workflow_dispatch:
    inputs:
      n_days:
        description: 'Number of days to determine which folders to delete. Example: 10 will delete all folders older than 10 days'
        required: true
        type: number
        default: 10
      delete_dev:
        description: 'Want to delete dev-results folder? Default is true'
        required: true
        type: boolean
        default: true
      delete_stg:
        description: 'Want to delete stg-results folder? Default is true'
        required: true
        type: boolean
        default: true

jobs:
  delete_old_folders:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.9

      - name: Run the script (dev-results)
        if: ${{ github.event.inputs.delete_dev }}
        run: python rm_old_folders.py --n-days ${{ github.event.inputs.n_days }} --folder-name ./dev-results

      - name: Run the script (stg-results)
        if: ${{ github.event.inputs.delete_stg }}
        run: python rm_old_folders.py --n-days ${{ github.event.inputs.n_days }} --folder-name ./stg-results

      - name: Generate manifests (dev-results, stg-results)
        run: |
          set -e

          generate_manifest () {
            env_dir="$1"
            mkdir -p "$env_dir"

            runs=$(ls -1 "$env_dir" 2>/dev/null | grep -E '^[0-9]{8}_[0-9]{6}Z$' | sort -r || true)

            echo '{ "runs": [' > "$env_dir/manifest.json"
            first=1
            for folder in $runs
            do
              if [ $first -eq 0 ]; then echo ',' >> "$env_dir/manifest.json"; fi
              first=0
              echo "  { \"folder\": \"${folder}\", \"url\": \"${env_dir}/${folder}/index.html\" }" >> "$env_dir/manifest.json"
            done
            echo '] }' >> "$env_dir/manifest.json"
          }

          generate_manifest "dev-results"
          generate_manifest "stg-results"

      - name: Commit all changed files back to the repository
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: gh-pages
          commit_message: Delete folders older than ${{ github.event.inputs.n_days }} days
